version: 3
parallel_plan: true
parallel_apply: true
abort_on_execution_order_fail: true

projects:
  - name: dev-foundation
    dir: envs/dev/us-east-1/00-foundation
    execution_order_group: 10
    autoplan:
      enabled: true
      when_modified:
        - "*.tf"
        - "../../../../modules/**/*.tf"

  - name: dev-contracts
    dir: envs/dev/us-east-1/10-contracts
    depends_on:
      - dev-foundation
    execution_order_group: 20
    autoplan:
      enabled: true
      when_modified:
        - "*.tf"
        - "../../../../catalog/sqs/**/*.yaml"
        - "../../../../modules/sqs-contracts/**/*.tf"

  - name: dev-package-service
    dir: envs/dev/us-east-1/20-services/package-service
    depends_on:
      - dev-contracts
    execution_order_group: 30
    autoplan:
      enabled: true
      when_modified:
        - "*.tf"
        - "../../../../../modules/**/*.tf"

  - name: dev-logistics-service
    dir: envs/dev/us-east-1/20-services/logistics-service
    depends_on:
      - dev-contracts
    execution_order_group: 30
    autoplan:
      enabled: true
      when_modified:
        - "*.tf"
        - "../../../../../modules/**/*.tf"

  - name: prod-foundation
    dir: envs/prod/us-east-1/00-foundation
    execution_order_group: 10
    apply_requirements:
      - approved
      - mergeable
      - undiverged

  - name: prod-contracts
    dir: envs/prod/us-east-1/10-contracts
    depends_on:
      - prod-foundation
    execution_order_group: 20
    apply_requirements:
      - approved
      - mergeable
      - undiverged
    autoplan:
      enabled: true
      when_modified:
        - "*.tf"
        - "../../../../catalog/sqs/**/*.yaml"
        - "../../../../modules/sqs-contracts/**/*.tf"

  - name: prod-package-service
    dir: envs/prod/us-east-1/20-services/package-service
    depends_on:
      - prod-contracts
    execution_order_group: 30
    apply_requirements:
      - approved
      - mergeable
      - undiverged

  - name: prod-logistics-service
    dir: envs/prod/us-east-1/20-services/logistics-service
    depends_on:
      - prod-contracts
    execution_order_group: 30
    apply_requirements:
      - approved
      - mergeable
      - undiverged
