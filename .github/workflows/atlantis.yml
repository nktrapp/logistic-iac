name: Atlantis

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    paths:
      - "atlantis.yaml"
      - "catalog/**"
      - "envs/**"
      - "modules/**"
      - ".github/workflows/atlantis.yml"
  issue_comment:
    types:
      - created
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  issues: write
  pull-requests: write
  statuses: write

concurrency:
  group: atlantis-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: false

jobs:
  atlantis:
    name: Atlantis via GitHub Actions
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        startsWith(github.event.comment.body, 'atlantis')
      )
    env:
      ATLANTIS_IMAGE: ghcr.io/runatlantis/atlantis:v0.43.0
      ATLANTIS_PORT: "4141"
      ATLANTIS_DATA_DIR: ${{ runner.temp }}/atlantis-data
      ATLANTIS_EVENT_WAIT_SECONDS: "900"
      ATLANTIS_WEBHOOK_SECRET: ${{ secrets.ATLANTIS_WEBHOOK_SECRET }}
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Atlantis data dir
        run: mkdir -p "${ATLANTIS_DATA_DIR}"

      - name: Configure AWS credentials
        if: ${{ vars.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Restore Atlantis data
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.ATLANTIS_DATA_DIR }}
          key: atlantis-data-pr-${{ env.PR_NUMBER }}-${{ github.run_id }}
          restore-keys: |
            atlantis-data-pr-${{ env.PR_NUMBER }}-

      - name: Run static repository checks
        run: |
          docker run --rm \
            --entrypoint sh \
            -v "$PWD:/workspace" \
            -w /workspace \
            "$ATLANTIS_IMAGE" \
            -ec '
              terraform fmt -check -recursive
              if grep -R --include="*.tf" -n "resource \"aws_sqs_queue\"" envs/*/*/20-services modules/ecs-service modules/service-iam 2>/dev/null; then
                echo "SQS queues must be managed only by modules/sqs-contracts and envs/*/*/10-contracts." >&2
                exit 1
              fi
            '

      - name: Stop on manual dispatch
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          echo "workflow_dispatch runs static checks only. Atlantis needs a pull_request or issue_comment event payload."

      - name: Start Atlantis
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: |
          set -euo pipefail

          if [ -z "${ATLANTIS_WEBHOOK_SECRET}" ]; then
            echo "::error::Configure the ATLANTIS_WEBHOOK_SECRET repository secret before running Atlantis."
            exit 1
          fi

          mkdir -p "${ATLANTIS_DATA_DIR}"

          docker run -d --rm \
            --name logistic-iac-atlantis \
            -p "${ATLANTIS_PORT}:4141" \
            -v "${ATLANTIS_DATA_DIR}:/atlantis-data" \
            -e ATLANTIS_GH_USER="github-actions[bot]" \
            -e ATLANTIS_GH_TOKEN="${{ github.token }}" \
            -e ATLANTIS_GH_WEBHOOK_SECRET="${ATLANTIS_WEBHOOK_SECRET}" \
            -e AWS_ACCESS_KEY_ID="${AWS_ACCESS_KEY_ID:-}" \
            -e AWS_SECRET_ACCESS_KEY="${AWS_SECRET_ACCESS_KEY:-}" \
            -e AWS_SESSION_TOKEN="${AWS_SESSION_TOKEN:-}" \
            -e AWS_REGION="${AWS_REGION}" \
            -e AWS_DEFAULT_REGION="${AWS_REGION}" \
            "$ATLANTIS_IMAGE" \
            server \
              --atlantis-url="http://127.0.0.1:${ATLANTIS_PORT}" \
              --data-dir=/atlantis-data \
              --repo-allowlist="github.com/${{ github.repository }}" \
              --log-level=info

          for attempt in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:${ATLANTIS_PORT}/healthz" >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          docker logs logistic-iac-atlantis
          echo "::error::Atlantis did not become healthy."
          exit 1

      - name: Forward GitHub event to Atlantis
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: |
          set -euo pipefail

          EVENT_NAME="${GITHUB_EVENT_NAME}"
          SIGNATURE="$(openssl dgst -sha256 -hmac "${ATLANTIS_WEBHOOK_SECRET}" "${GITHUB_EVENT_PATH}" | awk '{print "sha256="$2}')"

          curl --fail --show-error --silent \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: ${EVENT_NAME}" \
            -H "X-Hub-Signature-256: ${SIGNATURE}" \
            --data-binary "@${GITHUB_EVENT_PATH}" \
            "http://127.0.0.1:${ATLANTIS_PORT}/events"

          echo "Atlantis event accepted. Keeping the container alive for ${ATLANTIS_EVENT_WAIT_SECONDS}s so plan/apply can finish and comment on the PR."
          sleep "${ATLANTIS_EVENT_WAIT_SECONDS}"

      - name: Print Atlantis logs
        if: ${{ always() && github.event_name != 'workflow_dispatch' }}
        run: |
          docker logs logistic-iac-atlantis || true

      - name: Save Atlantis data
        if: ${{ always() }}
        uses: actions/cache/save@v4
        with:
          path: ${{ env.ATLANTIS_DATA_DIR }}
          key: atlantis-data-pr-${{ env.PR_NUMBER }}-${{ github.run_id }}
